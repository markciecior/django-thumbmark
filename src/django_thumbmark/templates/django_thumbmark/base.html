<!DOCTYPE html>

<html lang="en-us" dir="ltr">
<head>
    <noscript>
        <div class="no-js-message">
            {% block no-js-message %}JavaScript is disabled in your browser. Please enable it to use this site fully.{% endblock %}
        </div>
    </noscript>
    <script>
        document.body.classList.add('js-enabled');
    </script>
    <style>
        .no-js-message {
            display: block; /* Visible by default */
        }
        .js-enabled .no-js-message {
            display: none; /* Hidden when JavaScript is enabled */
        }
    </style>
    {% block js-source %}<script src="https://cdn.jsdelivr.net/npm/@thumbmarkjs/thumbmarkjs@1.10.0/dist/thumbmark.umd.js"></script>{% endblock %}
    {% block js-script %}<script data-tmurl="{{ tm_url }}">
        function getCookie(name) {
            const value = `; ${document.cookie}`;
            const parts = value.split(`; ${name}=`);
            if (parts.length === 2) return parts.pop().split(';').shift();
        }
        const passed_data = document.currentScript.dataset;
        const tmurl = passed_data.tmurl
        const csrftoken = getCookie('csrftoken');
        const tm = new ThumbmarkJS.Thumbmark();
        tm.get().then(
            function(res) {{
                const body = new URLSearchParams();
                body.set('tmid', res.thumbmark);
                fetch(tmurl, {
                    method: 'POST',
                    headers: {'X-CSRFToken': csrftoken},
                    body: body,
                })
                  .then(response => response.json())
                  .then(data => {
                        if (data.url){
                            console.log('redirecting to: ' + data.url)
                            window.location.href = data.url;
                        }
                        else {
                            console.log('response is: ' + response)
                        }
                    })
                  .catch(error => {
                    console.error(error);
                  });
            }}
        );
        </script>{% endblock %}
</head>
<body>
{% block body-content %}{% endblock %}
</body>
